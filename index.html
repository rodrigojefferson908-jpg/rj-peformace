<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Designar Treino - RJ Performance</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
        }

        .alunas-checklist {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            background: #fafafa;
        }

        .aluna-item {
            display: flex;
            align-items: center;
            padding: 8px 4px;
            border-bottom: 1px solid #f1f5f9;
        }

        .aluna-item:last-child {
            border-bottom: none;
        }

        .aluna-item input[type="checkbox"] {
            margin-right: 12px;
            transform: scale(1.1);
            cursor: pointer;
        }

        .aluna-item label {
            margin: 0;
            cursor: pointer;
            font-weight: normal;
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background-color: #1d4ed8;
        }

        .select-all-container {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Designar Treino Coletivo</h2>
    
    <div class="form-group">
        <label for="treino-select">Selecione o Treino Base:</label>
        <select id="treino-select">
            <option value="">-- Escolha um treino ou modelo --</option>
            </select>
    </div>

    <div class="form-group">
        <label>Selecione as Alunas:</label>
        <div class="select-all-container">
            <input type="checkbox" id="select-all" onclick="toggleSelectAll(this)">
            <label for="select-all" style="margin-left: 8px; font-weight: normal; font-size: 14px; color: #64748b;">Selecionar todas</label>
        </div>
        <div class="alunas-checklist" id="alunas-lista">
            <p style="color: #64748b; font-size: 14px;">Carregando alunas...</p>
        </div>
    </div>

    <button class="btn-submit" onclick="atribuirTreinoColetivo()">Atribuir Treino</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script src="app.js"></script>
</body>
</html>
